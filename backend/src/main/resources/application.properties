spring.application.name=exconversation-backend

# ============================================
# Database Configuration (SQL Server)
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=exconversation_db;encrypt=false;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================
# JPA/Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# Tắt globally_quoted_identifiers để columnDefinition không bị wrap trong []
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
# SQL Server specific configuration
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.properties.hibernate.use_sql_comments=false
# Disable Hibernate DDL logging
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.tool.schema=WARN

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=10MB

# ============================================
# File Storage Configuration
# ============================================
file.upload-dir=./uploads
file.images-dir=./uploads/images
file.export-dir=./uploads/exports

# ============================================
# CORS Configuration (for React Frontend)
# ============================================
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ============================================
# Server Configuration
# ============================================
server.port=8080
spring.mvc.cors.mapping.path=/**

# ============================================
# Gemini AI Configuration
# ============================================
gemini.api.key=AIzaSyDmF_TA1Ei6BQHhqD4BnYLfcX4978-gA_I
gemini.api.model=gemini-2.5-flash
gemini.api.max-tokens=8192
gemini.api.temperature=0.1
gemini.api.batch-size=5
gemini.api.rate-limit-per-minute=8
gemini.api.retry-max-attempts=5
gemini.api.retry-delay-ms=2000
gemini.api.request-delay-ms=8000
gemini.api.cache-enabled=true
gemini.api.cache-ttl-seconds=3600

# ============================================
# Async Configuration
# ============================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=ai-parse-
